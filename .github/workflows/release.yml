name: Release

on:
  pull_request:
    types: [closed]
  push:
    tags:
      - "v*"

jobs:
  build:
    if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'master' && github.event.pull_request.head.ref == 'development') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Set release version
        id: version
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="v$(cat VERSION)"
          fi
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-qa(\.[0-9]+)?)?$ ]]; then
            echo "VERSION must produce a release tag formatted vX.Y.Z or vX.Y.Z-qa(.N)."
            echo "Resolved: ${VERSION}"
            exit 1
          fi
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.43.1

      - name: Build release binaries
        run: |
          mkdir -p dist
          TAG="${{ steps.version.outputs.tag }}"
          VERSION_NO_V="${TAG#v}"
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.version.outputs.tag }}" -o dist/yanzi-linux-amd64 ./cmd/yanzi
          GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.version.outputs.tag }}" -o dist/yanzi-darwin-amd64 ./cmd/yanzi
          GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.version=${{ steps.version.outputs.tag }}" -o dist/yanzi-darwin-arm64 ./cmd/yanzi
          mkdir -p dist/windows
          GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.version.outputs.tag }}" -o dist/windows/yanzi.exe ./cmd/yanzi
          (cd dist/windows && zip -q -r ../yanzi-windows-amd64.zip yanzi.exe)
          sed -i "s/^version: .*/version: ${VERSION_NO_V}/" nfpm.yaml
          "$(go env GOPATH)/bin/nfpm" pkg --config nfpm.yaml --packager deb --target dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
          files: dist/*
