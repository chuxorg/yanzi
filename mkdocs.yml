site_name: Yanzi
site_description: Technical documentation for Yanzi
repo_name: chuxorg/yanzi
repo_url: https://github.com/chuxorg/yanzi
docs_dir: docs

theme:
  name: material
  logo: assets/brand/favicon.svg
  favicon: assets/brand/favicon.png
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

extra_css:
  - stylesheets/brand.css

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Problem: problem.md
  - Local-First Operation: local-first.md
  - Continuity Philosophy: continuity.md
  - JSON Contracts: json-contracts.md
  - Metadata Semantics: metadata.md
  - Architectural Guardrails: guardrails.md
  - How It Works: how-it-works.md
  - Use Yanzi: use-yanzi.md
  - UI: ui.md
  - CLI: cli.md
  - Install: install.md
  - Quickstart: quickstart.md
  - AI Seed: ai-seed.md
  - Use Cases:
      - Overview: use-cases/index.md
      - Agent Communication: use-cases/agent-communication.md
      - Seeding: use-cases/seeding.md
      - Retrieval: use-cases/retrieval.md
  - Rehydrate: rehydrate.md
  - Architecture: architecture.md
  - API: api/index.md
  - Agent Bootstrap: agent-bootstrap.md
  - Release Protocol: dev/RELEASE_PROTOCOL.md
  - Code Documentation: dev/CODE_DOCUMENTATION.md
  - Branch Protection: dev/BRANCH_PROTECTION.md
  - Generated API:
      - Overview: api/index.md
      - CLI Package: api/cmd.md
      - Internal Packages: api/internal.md
      - Combined API: API.md
